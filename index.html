<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glow Saunas | Luxury Custom Builds</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Montserrat:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #c9a15c; --dark: #111; }
        body { font-family: 'Montserrat', sans-serif; background: var(--dark); color: white; margin: 0; line-height: 1.6; }
        
        /* Header */
        header { padding: 30px 20px; text-align: center; background: #000; }
        .logo-img { height: 60px; width: auto; margin-bottom: 10px; }
        
        /* Gallery */
        .gallery { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; padding: 40px 20px; max-width: 1200px; margin: auto; }
        .gallery img { 
            width: 100%; 
            height: 300px; 
            object-fit: cover; 
            border-radius: 15px; 
            border: 1px solid #333; 
        }
        
        /* Contact/Footer */
        footer { padding: 40px; text-align: center; color: #777; font-size: 0.9rem; }
    </style>
</head>
<body>

<header>
    <img src="https://i.ibb.co/RGbcnTC8/logo-name.png" alt="Glow Saunas" class="logo-img">
    <h1>Elevated Sauna Experiences</h1>
</header>

<section class="gallery">
    <img src="custom-sauna-build-toronto.jpg" alt="Custom Sauna Build in Toronto">
    <img src="luxury-sauna-installation-gta.jpg" alt="Luxury Sauna Installation in GTA">
    <img src="csa-standard-sauna-design.jpg" alt="CSA Standard Sauna Design">
</section>

<footer>
    © 2026 Glow Saunas. ECRA/ESA Licence #7010787 | Toronto & GTA
</footer>

</body>
</html>
